services:
  postgres:
    image: postgres:16-alpine
    container_name: eventmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eventmanager
      POSTGRES_PASSWORD: eventmanager
      POSTGRES_DB: eventmanager
    ports:
      - "5432:5432"
    volumes:
      - eventmanager_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventmanager -d eventmanager"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  eventmanager_postgres_data:
