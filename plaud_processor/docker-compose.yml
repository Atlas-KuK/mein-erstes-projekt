services:
  # Hintergrund-Verarbeitung: Polling, Transkription, Analyse, PDF, E-Mail
  plaud-processor:
    build: .
    container_name: plaud-processor
    command: python main.py
    volumes:
      - plaud-data:/data
      - ${PLAUD_WATCH_FOLDER:-./watch}:/watch:ro
      - ${PDF_OUTPUT_FOLDER:-./output}:/output
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
      - PLAUD_WATCH_FOLDER=/watch
      - PDF_OUTPUT_FOLDER=/output
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on:
      - plaud-web

  # Web-UI: Dashboard, Upload, Sprecher-Zuweisung
  plaud-web:
    build: .
    container_name: plaud-web
    command: uvicorn web_app:app --host 0.0.0.0 --port 8080
    ports:
      - "8080:8080"
    volumes:
      - plaud-data:/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  plaud-data:
