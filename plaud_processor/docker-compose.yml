services:
  plaud-processor:
    build: .
    container_name: plaud-processor
    restart: unless-stopped          # startet automatisch nach Neustart des PCs

    env_file:
      - .env                         # alle API-Schlüssel aus der .env Datei

    volumes:
      # Plaud Aufnahmen-Ordner einbinden (Pfad in .env setzen)
      - "${PLAUD_WATCH_FOLDER:-./aufnahmen}:/watch"
      # Daten: Logs, PDFs, Status
      - plaud-data:/data

    environment:
      - WORK_DIR=/data
      - PLAUD_WATCH_FOLDER=/watch    # im Container immer /watch

volumes:
  plaud-data:
    driver: local
