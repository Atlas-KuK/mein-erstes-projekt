<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Plaud Audio Processor{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">Plaud Processor</a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/api/status" target="_blank">Status</a>
    </div>
  </nav>

  {% if config_warnungen is defined and config_warnungen %}
  <div class="warnungen">
    {% for w in config_warnungen %}
    <div class="warnung">Warnung: {{ w }}</div>
    {% endfor %}
  </div>
  {% endif %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Plaud Audio Processor &mdash; lokal &amp; kostenlos</p>
  </footer>
  <script src="/static/app.js"></script>
</body>
</html>
